name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate skills (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Validate skill structure and compile scripts
        run: python3 tools/validate_skills.py
      - name: Check shared scripts are in sync
        run: python3 tools/sync_shared.py --check
      - name: Smoke-test the Markdown -> .docx converter
        run: |
          printf '# Title\n\nA **paragraph** with a [link](https://example.com).\n\n| A | B |\n|---|---|\n| 1 | 2 |\n\n- one\n- two\n' > /tmp/r.md
          python3 tools/md_to_docx.py /tmp/r.md -o /tmp/r.docx
          python3 - <<'PY'
          import zipfile, xml.dom.minidom as m
          z = zipfile.ZipFile("/tmp/r.docx")
          assert "word/document.xml" in z.namelist(), "missing document.xml"
          m.parseString(z.read("word/document.xml"))  # well-formed XML
          print("docx OK")
          PY
      - name: Smoke-test the findings -> .csv flattener
        run: |
          printf '{"severity":{"low_check":"Low","missing_title":"High"},"findings":{"low_check":[{"page":"https://example.com/b"}],"missing_title":[{"page":"https://example.com/a"}]}}' > /tmp/ar.json
          python3 tools/findings_to_csv.py /tmp/ar.json -o /tmp/findings.csv
          python3 - <<'PY'
          import csv
          with open("/tmp/findings.csv", newline="") as f:
              rows = list(csv.DictReader(f))
          assert len(rows) == 2, rows
          # High sorts before Low, and severity/check/page columns are populated.
          assert rows[0]["severity"] == "High" and rows[0]["check"] == "missing_title", rows
          assert rows[0]["page"] == "https://example.com/a", rows
          print("csv OK")
          PY

  cli:
    name: CLI smoke test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: List skills
        run: node bin/cli.js list
      - name: Install all skills into a temp dir
        run: |
          node bin/cli.js install --dir "$RUNNER_TEMP/skills"
          test -f "$RUNNER_TEMP/skills/sitemap-audit/SKILL.md"
